document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:11px;text-transform:uppercase;letter-spacing:.05em;border-left:1px solid var(--hair);display:flex;align-items:center;transition:.2s}\n  .bar nav a:hover{background:var(--acc);color:#fff}\n  .bar nav a.cv{background:var(--ink);color:var(--bg)}\n  .bar nav a.cv:hover{background:var(--acc)}\n  @media(max-width:760px){.bar nav a:not(.cv){display:none}}\n\n  /* hero */\n  .hero{padding:118px 0 0;border-bottom:1px solid var(--line)}\n  .hero-top{display:flex;justify-content:space-between;padding:14px 40px;border-bottom:1px solid var(--hair);color:var(--soft)}\n  .hero-name{padding:30px 40px 26px;border-bottom:1px solid var(--hair)}\n  .hero-name h1{font-size:clamp(58px,13vw,200px);font-weight:600;line-height:.86;letter-spacing:-.03em;text-transform:uppercase}\n  .hero-name h1 .o{-webkit-text-stroke:2px var(--ink);color:transparent}\n  .hero-grid{display:grid;grid-template-columns:1.5fr 1fr}\n  .hero-grid>div{padding:34px 40px}\n  .hero-grid>div:first-child{border-right:1px solid var(--hair)}\n  .hero-lede{font-size:clamp(20px,2.4vw,28px);line-height:1.32;letter-spacing:-.01em;max-width:24ch}\n  .hero-lede b{color:var(--acc)}\n  .hero-meta .m-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--hair);font-family:var(--mono);font-size:12px;text-transform:uppercase}\n  .hero-meta .m-row span:last-child{color:var(--soft)}\n  .marquee{border-bottom:1px solid var(--line);background:var(--acc);color:#fff;overflow:hidden;white-space:nowrap}\n  .marquee div{display:inline-block;padding:11px 0;font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;animation:scroll 26s linear infinite}\n  .marquee span{padding:0 26px}\n  @keyframes scroll{to{transform:translateX(-50%)}}\n  @media(max-width:760px){.hero-grid{grid-template-columns:1fr}.hero-grid>div:first-child{border-right:none;border-bottom:1px solid var(--hair)}}\n\n  /* section header band */\n  .band{display:flex;align-items:baseline;gap:18px;padding:20px 40px;border-bottom:1px solid var(--line);background:var(--bg)}\n  .band .n{font-family:var(--mono);font-size:12px;color:var(--acc)}\n  .band h2{font-size:clamp(22px,3vw,34px);font-weight:700;letter-spacing:-.02em;text-transform:uppercase}\n\n  /* about */\n  .about{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line)}\n  .about>div{padding:40px}\n  .about>div:first-child{border-right:1px solid var(--hair)}\n  .about p{font-size:18px;line-height:1.6;margin-bottom:18px}\n  .about p:last-child{margin-bottom:0}\n  .portrait{position:relative;width:100%;max-width:320px;margin-bottom:28px;border:1px solid var(--line);background:var(--ink)}\n  .portrait img{display:block;width:100%;aspect-ratio:1/1;object-fit:cover;filter:grayscale(1) contrast(1.04);transition:filter .45s ease,transform .45s ease}\n  .portrait:hover img{filter:none}\n  .portrait figcaption{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg);border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--soft)}\n  .portrait figcaption .dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 0 var(--acc);animation:ipulse 2.4s infinite}\n  @keyframes ipulse{0%{box-shadow:0 0 0 0 rgba(59,39,255,.5)}70%{box-shadow:0 0 0 6px rgba(59,39,255,0)}100%{box-shadow:0 0 0 0 rgba(59,39,255,0)}}\n  .about .lbl{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--soft);margin-bottom:16px;letter-spacing:.06em}\n  .factlist{font-family:var(--mono);font-size:13px}\n  .factlist .f{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--hair)}\n  .factlist .f span:last-child{color:var(--acc)}\n  .status-card{margin-top:24px;border:1px solid var(--line);background:var(--ink);color:var(--bg)}\n  .status-card .sc-row{display:flex;justify-content:space-between;align-items:center;p ily:var(--mono);font-size:11px;text-transform:uppercase;color:var(--acc);margin-bottom:12px;letter-spacing:.06em}\n  .skills p{font-size:15px;line-height:1.6}\n  @media(max-width:760px){.skills{grid-template-columns:1fr}.skills>div{border-right:none}}\n\n  /* contact */\n  .contact{padding:80px 40px;border-bottom:1px solid var(--line)}\n  .contact h2{font-size:clamp(40px,9vw,128px);font-weight:600;line-height:.9;letter-spacing:-.03em;text-transform:uppercase;margin-bottom:36px}\n  .contact h2 a{color:var(--acc)}\n  .contact h2 a:hover{text-decoration:underline}\n  .clinks{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--line)}\n  .clinks a{padding:22px 18px;border-right:1px solid var(--hair);font-family:var(--mono);font-size:12px;text-transform:uppercase;transition:.2s;display:flex;justify-content:space-between}\n  .clinks a:last-child{border-right:none}\n  .clinks a:hover{background:var(--acc);color:#fff}\n  .clinks a::after{content:\"↗\"}\n  @media(max-width:760px){.clinks{grid-template-columns:1fr 1fr}}\n\n  footer{display:flex;justify-content:space-between;padding:18px 40px;font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--soft)}\n\n  .reveal{opacity:0;transform:translateY(22px);transition:.8s cubic-bezier(.2,.7,.2,1)}\n  .reveal.in{opacity:1;transform:none}\n  @media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<header><div class=\"bar\">\n  <div class=\"b-brand\">MQ⁠—⁠26<\u002Fdiv>\n  <nav>\n    <a href=\"#about\">About<\u002Fa><a href=\"#work\">Work<\u002Fa><a href=\"#enterprise\">Enterprise<\u002Fa><a href=\"#experience\">Exp<\u002Fa><a href=\"#contact\">Contact<\u002Fa>\n    <a class=\"cv\" href=\"https://drive.google.com/file/d/1YtoIOFI9hc_WxQP3ZoW7x4iMWwlPVISS/view?usp=sharing\" target=\"_blank\">Résumé<\u002Fa>\n  <\u002Fnav>\n<\u002Fdiv><\u002Fheader>\n\n<div class=\"frame\">\n  <!-- HERO -->\n  <section class=\"hero\">\n    <div class=\"hero-top mono\"><span>Senior Software &amp; AI Engineer<\u002Fspan><span>Lahore · Pakistan<\u002Fspan><\u002Fdiv>\n    <div class=\"hero-name\"><h1>Mujtaba<br><span class=\"o\">Qureshi<\u002Fspan><\u002Fh1><\u002Fdiv>\n    <div class=\"hero-grid\">\n      <div class=\"reveal\"><p class=\"hero-lede\">I engineer <b>scalable systems<\u002Fb> and <b>AI-native products<\u002Fb> — backends, agents, and the interfaces people actually use.<\u002Fp><\u002Fdiv>\n      <div class=\"hero-meta reveal\">\n        <div class=\"m-row\"><span>Experience<\u002Fspan><span>4 Years<\u002Fspan><\u002Fdiv>\n        <div class=\"m-row\"><span>Focus<\u002Fspan><span>Full-stack · AI<\u002Fspan><\u002Fdiv>\n        <div class=\"m-row\"><span>Flagship<\u002Fspan><span style=\"text-transform:none\">icod.ai<\u002Fspan><\u002Fdiv>\n        <div class=\"m-row\"><span>Status<\u002Fspan><span>Available<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div class=\"marquee\"><div><span>NestJS<\u002Fspan>·<span>FastAPI<\u002Fspan>·<span>Django<\u002Fspan>·<span>RAG<\u002Fspan>·<span>MCP<\u002Fspan>·<span>Microservices<\u002Fspan>·<span>React<\u002Fspan>·<span>Next.js<\u002Fspan>·<span>Kubernetes<\u002Fspan>·<span>Redis<\u002Fspan>·<span>Stripe<\u002Fspan>·<span>NestJS<\u002Fspan>·<span>FastAPI<\u002Fspan>·<span>Django<\u002Fspan>·<span>RAG<\u002Fspan>·<span>MCP<\u002Fspan>·<span>Microservices<\u002Fspan>·<span>React<\u002Fspan>·<span>Next.js<\u002Fspan>·<span>Kubernetes<\u002Fspan>·<span>Redis<\u002Fspan>·<span>Stripe<\u002Fspan>·<\u002Fdiv><\u002Fdiv>\n\n  <!-- ABOUT -->\n  <div id=\"about\" class=\"band\"><span class=\"n\">01<\u002Fspan><h2>About<\u002Fh2><\u002Fdiv>\n  <section class=\"about\">\n    <div class=\"reveal\">\n      <figure class=\"portrait\">\n        <img src=\"196705fd-d0a4-469c-8730-40eec05b5669\" alt=\"Mujtaba Qureshi\">\n        <figcaption><span>// mujtaba_qureshi.jpg<\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Ffigcaption>\n      <\u002Ffigure>\n      <p>I'm a senior engineer working where <b style=\"color:var(--acc)\">distributed backend systems<\u002Fb> meet applied AI. Over four years I've moved products from monolith to microservices, designed agent orchestration, and shipped interfaces that real customers depend on.<\u002Fp>\n      <p>My current work centers on <b style=\"color:var(--acc)\">icod.ai<\u002Fb> — a Replit/Lovable-style platform for building full-stack websites through conversation. I work across the agent service, the in-app code editor, and the automation that deploys every user's site.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"reveal\">\n      <div class=\"lbl\">// runtime config<\u002Fdiv>\n      <div class=\"factlist\">\n        <div class=\"f\"><span>discipline<\u002Fspan><span>full-stack · ai<\u002Fspan><\u002Fdiv>\n        <div class=\"f\"><span>backend<\u002Fspan><span>node · nestjs · fastapi<\u002Fspan><\u002Fdiv>\n        <div class=\"f\"><span>frontend<\u002Fspan><span>react · next · angular<\u002Fspan><\u002Fdiv>\n        <div class=\"f\"><span>ai / llm<\u002Fspan><span>rag · agents · mcp<\u002Fspan><\u002Fdiv>\n        <div class=\"f\"><span>infra<\u002Fspan><span>docker · k8s · aws<\u002Fspan><\u002Fdiv>\n        <div class=\"f\"><span>automation<\u002Fspan><span>copilot studio · n8n<\u002Fspan><\u002Fdiv>\n        <div class=\"f\"><span>cross-platform<\u002Fspan><span>react native · electron<\u002Fspan><\u002Fdiv>\n        <div class=\"f\"><span>remote<\u002Fspan><span>usa · uk · ksa<\u002Fspan><\u002Fdiv>\n        <div class=\"f\"><span>based<\u002Fspan><span>lahore, pk<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"status-card\">\n        <div class=\"sc-row\"><span class=\"sc-k\">status<\u002Fspan><span class=\"sc-v\"><span class=\"sc-dot\"><\u002Fspan>open to select work<\u002Fspan><\u002Fdiv>\n        <div class=\"sc-row\"><span class=\"sc-k\">currently<\u002Fspan><span class=\"sc-v\">building <a href=\"https://icod.ai\" target=\"_blank\" style=\"text-transform:none;color:var(--acc);text-decoration:underline;text-underline-offset:3px\">icod.ai<\u002Fa><\u002Fspan><\u002Fdiv>\n        <div class=\"sc-row\"><span class=\"sc-k\">response<\u002Fspan><span class=\"sc-v\">within 24 hrs<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WORK -->\n  <div id=\"work\" class=\"band\"><span class=\"n\">02<\u002Fspan><h2>Selected Work<\u002Fh2><\u002Fdiv>\n\n  <article class=\"proj reveal\">\n    <div class=\"proj-inner\">\n      <div class=\"p-num\">001<\u002Fdiv>\n      <div class=\"p-head\"><h3><a href=\"https://icod.ai\" target=\"_blank\">icod.ai<\u002Fa><\u002Fh3><div class=\"p-flag\">Flagship · AI No-Code<\u002Fdiv><\u002Fdiv>\n      <div>\n        <p class=\"p-desc\">A Replit/Lovable-style platform where anyone builds full-stack websites by talking. I converted the monolith into NestJS microservices with Redis inter-service comms, designed agentic chatbot flows for AI website generation, built the in-app code editor, and automated user-site deployment via Ansible, Route 53 &amp; Nginx — eliminating every manual step. Also shipped the FastAPI agent service and migrated payments to Stripe with recurring-billing webhooks.<\u002Fp>\n        <div class=\"tags\"><span class=\"tag\">NestJS<\u002Fspan><span class=\"tag\">Microservice Architecture<\u002Fspan><span class=\"tag\">Agent Orchestration<\u002Fspan><span class=\"tag\">Coding Agent<\u002Fspan><span class=\"tag\">Workflows<\u002Fspan><span class=\"tag\">Redis<\u002Fspan><span class=\"tag\">Stripe MCP<\u002Fspan><span class=\"tag\">Ansible<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n\n  <article class=\"proj reveal\">\n    <div class=\"proj-inner\">\n      <div class=\"p-num\">002<\u002Fdiv>\n      <div class=\"p-head\"><h3><a href=\"https://dev.unireal.io\" target=\"_blank\">GEMINI Advision<\u002Fa><\u002Fh3><div class=\"p-flag\">Multi-tenant Analytics<\u002Fdiv><\u002Fdiv>\n      <div>\n        <p class=\"p-desc\">AI-powered multi-tenant analytics &amp; campaign platform. I built scalable, modular React frontends, complex loyalty-tier and segmentation interfaces, an interactive spinning-wheel game with configurable reward logic, and Chart.js dashboards surfacing AI insights — interactions, emotions, demographics, engagement — plus Google Maps clustering for campaign deployment across regions.<\u002Fp>\n        <div class=\"tags\"><span class=\"tag\">React<\u002Fspan><span class=\"tag\">RTK Query<\u002Fspan><span class=\"tag\">Chart.js<\u002Fspan><span class=\"tag\">FastAPI<\u002Fspan><span class=\"tag\">RBAC<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n\n  <article class=\"proj reveal\">\n    <div class=\"proj-inner\">\n      <div class=\"p-num\">003<\u002Fdiv>\n      <div class=\"p-head\"><h3><a href=\"https://breshna.io\" target=\"_blank\">breshna.io<\u002Fa><\u002Fh3><div class=\"p-flag\">Full Stack Developer · gaming.dev<\u002Fdiv><\u002Fdiv>\n      <div>\n        <p class=\"p-desc\">A web &amp; WebGL platform for creating, customizing and publishing Unity games. I delivered white-labeled microsite versions embedded inside partner mobile apps — <b style=\"color:var(--acc)\">Ooredoo (Qatar)<\u002Fb>, <b style=\"color:var(--acc)\">Jazz Simosa<\u002Fb> and <b style=\"color:var(--acc)\">Easypaisa<\u002Fb> — owning client communication and translating enterprise vendor requirements into platform features. Collaborated end-to-end with the Unity team on game-build integration and built the admin panel for games, assets and runtime configuration.<\u002Fp>\n        <div class=\"tags\"><span class=\"tag\">Microsites<\u002Fspan><span class=\"tag\">Unity Integration<\u002Fspan><span class=\"tag\">Admin Panel<\u002Fspan><span class=\"tag\">Client Communication<\u002Fspan><span class=\"tag\">Full-stack<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n\n  <article class=\"proj reveal\">\n    <div class=\"proj-inner\">\n      <div class=\"p-num\">004<\u002Fdiv>\n      <div class=\"p-head\"><h3><a href=\"https://app.docupare.ai\" target=\"_blank\">Docupare AI<\u002Fa><\u002Fh3><div class=\"p-flag\">Document Automation<\u002Fdiv><\u002Fdiv>\n      <div>\n        <p class=\"p-desc\">Automated invoice handler with a custom PDF editor — place ticks, compare two PDFs side by side, split &amp; reorder pages by drag-and-drop. SSR and service workers offloaded heavy work to system threads, cutting manual processing time per invoice by 70%.<\u002Fp>\n        <div class=\"tags\"><span class=\"tag\">Next.js SSR<\u002Fspan><span class=\"tag\">Service Workers<\u002Fspan><span class=\"tag\">PDF Tooling<\u002Fspan><span class=\"tag\">Drag &amp; Drop<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n\n  <!-- ENTERPRISE SOLUTIONS -->\n  <div id=\"enterprise\" class=\"band\"><span class=\"n\">03<\u002Fspan><h2>Enterprise Solutions<\u002Fh2><\u002Fdiv>\n  <section class=\"ent\">\n    <div class=\"ent-cell reveal\">\n      <div class=\"ent-k\">// copilot studio · ask hr<\u002Fdiv>\n      <h3>Ask HR — US Enterprise<\u002Fh3>\n      <p class=\"ent-desc\">An internal “Ask HR” assistant for a US enterprise entity, built on Microsoft Copilot Studio. I designed the conversational flows and knowledge grounding to deliver accurate, source-backed answers from internal HR documentation, and integrated a ServiceNow connector to auto-create and route HR incidents straight from the chat.<\u002Fp>\n      <div class=\"tags\"><span class=\"tag\">Copilot Studio<\u002Fspan><span class=\"tag\">ServiceNow<\u002Fspan><span class=\"tag\">Knowledge Grounding<\u002Fspan><span class=\"tag\">RAG<\u002Fspan><span class=\"tag\">Conversational AI<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ent-cell reveal\">\n      <div class=\"ent-k\">// orchestration · automation<\u002Fdiv>\n      <h3>n8n Workflow Automation<\u002Fh3>\n      <p class=\"ent-desc\">Built end-to-end automation pipelines on n8n — connecting CRMs, payments, AI services and internal APIs into self-running workflows. Replaced manual ops with event-driven orchestration, custom nodes, and AI-in-the-loop steps that scale across an organisation.<\u002Fp>\n      <div class=\"tags\"><span class=\"tag\">n8n<\u002Fspan><span class=\"tag\">Webhooks<\u002Fspan><span class=\"tag\">Custom Nodes<\u002Fspan><span class=\"tag\">AI-in-the-loop<\u002Fspan><span class=\"tag\">Integrations<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EXPERIENCE -->\n  <div id=\"experience\" class=\"band\"><span class=\"n\">04<\u002Fspan><h2>Experience<\u002Fh2><\u002Fdiv>\n  <div class=\"reveal\">\n    <div class=\"exp\">\n      <div class=\"when\">Apr 2025 —<br>Present<\u002Fdiv>\n      <div>\n        <h3>Senior Software Engineer<\u002Fh3><div class=\"co\">Big Entities · icod.ai<\u002Fdiv>\n        <ul>\n          <li>Migrated monolith to NestJS microservices; scaled inter-service comms via Redis.<\u002Fli>\n          <li>Built the FastAPI agent service — orchestration, code gen, embeddings, retrieval.<\u002Fli>\n          <li>Automated user-site deployment; integrated Stripe payments and the Stripe MCP server.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"exp\">\n      <div class=\"when\">Dec 2023 —<br>Apr 2025<\u002Fdiv>\n      <div>\n        <h3>Software Engineer<\u002Fh3><div class=\"co\">Emblem Technologies<\u002Fdiv>\n        <ul>\n          <li>Scalable, modular React frontends for a multi-tenant analytics platform.<\u002Fli>\n          <li>Loyalty interfaces, an interactive game, and Chart.js analytics dashboards.<\u002Fli>\n          <li>Custom PDF editor &amp; splitter → 70% reduction in invoice processing time.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"exp\">\n      <div class=\"when\">Dec 2022 —<br>Dec 2023<\u002Fdiv>\n      <div>\n        <h3>Full Stack Developer<\u002Fh3><div class=\"co\">gaming.dev · breshna.io<\u002Fdiv>\n        <ul>\n          <li>Built and integrated vendor microsites into flagship telco &amp; fintech apps — Ooredoo (Qatar), Jazz Simosa, Easypaisa.<\u002Fli>\n          <li>Coordinated full-stack with the Unity team on game integration; owned client communication and custom requirements.<\u002Fli>\n          <li>Built the admin panel for game, asset and configuration customization.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SKILLS -->\n  <div id=\"skills\" class=\"band\"><span class=\"n\">05<\u002Fspan><h2>Capabilities<\u002Fh2><\u002Fdiv>\n  <section class=\"skills reveal\">\n    <div><h4>Backend<\u002Fh4><p>Node.js, NestJS, Microservices, FastAPI, GraphQL, Redis, BullMQ<\u002Fp><\u002Fdiv>\n    <div><h4>Frontend<\u002Fh4><p>TypeScript, React, Next.js, AngularJS, RTK Query, RxJS, NgRx<\u002Fp><\u002Fdiv>\n    <div><h4>AI &amp; LLM<\u002Fh4><p>RAG, LangChain, Tool Calling, Agent Orchestration, MCP, embeddings<\u002Fp><\u002Fdiv>\n    <div><h4>Cross-Platform<\u002Fh4><p>React Native (mobile), Electron (desktop)<\u002Fp><\u002Fdiv>\n    <div><h4>DevOps<\u002Fh4><p>Docker, Kubernetes, CI/CD, EC2, VPC, Ansible, Nginx<\u002Fp><\u002Fdiv>\n    <div><h4>Data &amp; ORMs<\u002Fh4><p>MongoDB, PostgreSQL, Prisma, Mongoose<\u002Fp><\u002Fdiv>\n    <div><h4>Automation<\u002Fh4><p>n8n, GitHub Copilot Studio<\u002Fp><\u002Fdiv>\n    <div><h4>Styling<\u002Fh4><p>Tailwind, Material UI, SCSS, PrimeNG<\u002Fp><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" class=\"contact reveal\">\n    <h2>Let's build<br>something <a href=\"mailto:qmujtaba09@gmail.com\">real.<\u002Fa><\u002Fh2>\n    <div class=\"clinks\">\n      <a href=\"mailto:qmujtaba09@gmail.com\">Email<\u002Fa>\n      <a href=\"tel:+923055918799\">Phone<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/mujtabaqureshii/\" target=\"_blank\">LinkedIn<\u002Fa>\n      <a href=\"https://github.com/mujtabaqureshi2\" target=\"_blank\">GitHub<\u002Fa>\n      <a href=\"https://drive.google.com/file/d/1YtoIOFI9hc_WxQP3ZoW7x4iMWwlPVISS/view?usp=sharing\" target=\"_blank\">Résumé<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer><span>© 2026 Mujtaba Qureshi<\u002Fspan><span>0305 5918799 · Lahore, PK<\u002Fspan><\u002Ffooter>\n<\u002Fdiv>\n\n<script>\n  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.1});\n  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
